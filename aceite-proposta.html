<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aceite de Proposta — SafeZone Smart</title>
<meta property="og:title" content="Confirmar aceite da proposta — SafeZone Smart">
<meta property="og:description" content="Toque para revisar e confirmar sua proposta.">
<meta property="og:image" content="https://safezonesmart.com.br/imagens/logo.png">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Montserrat',sans-serif;background:#f3f4f6;color:#374151;min-height:100vh;padding:24px 12px;display:flex;justify-content:center}
  .wrap{max-width:600px;width:100%}
  .capa-img{width:100%;border-radius:10px;margin-bottom:16px;display:block}
  .gp-page{background:#fff;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.08);position:relative;overflow:hidden}
  .gp-watermark{position:absolute;top:15%;right:-10px;width:180px;opacity:.4;pointer-events:none;z-index:0}
  .gp-header-right{position:absolute;top:0;right:0;width:34%;height:auto;pointer-events:none;z-index:1}
  .gp-content{padding:28px 26px;position:relative;z-index:2}
  .gp-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:14px}
  .gp-logo{height:38px;width:auto;object-fit:contain}
  .selo{font-size:10px;font-weight:700;color:#79B913;border:1px solid #C0DD97;background:#EAF3DE;padding:4px 10px;border-radius:20px;white-space:nowrap}
  .eyebrow{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:#9ca3af;display:block;margin-bottom:6px}
  .capa-titulo{font-size:24px;font-weight:900;color:#2D3748;letter-spacing:-.5px;text-transform:uppercase;margin-bottom:14px}
  .capa-texto{font-size:12px;color:#374151;line-height:1.65;text-align:justify;font-weight:300}
  .servico-titulo{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:#6b7280;margin-bottom:2px}
  .sub{font-size:12px;color:#9ca3af;margin-bottom:16px}
  table{width:100%;border-collapse:collapse;margin-bottom:14px;font-size:11px}
  thead th{background:#79B913;color:#fff;font-weight:700;text-align:left;padding:6px 8px}
  thead th:first-child{border-radius:6px 0 0 6px}
  thead th:last-child{border-radius:0 6px 6px 0}
  th.num,td.num{text-align:right}
  td{color:#1f2937;padding:6px 8px;border-bottom:1px solid #f3f4f6}
  tr.servico-row td{font-weight:700;padding-top:9px}
  .total-bar{background:#F0FDF4;border-radius:8px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
  .total-label{font-size:13px;font-weight:700;color:#1f2937}
  .total-val{font-size:17px;font-weight:800;color:#79B913}
  .fabricante-logo{display:block;height:34px;object-fit:contain;margin:0 auto 16px}
  .cond-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
  .cond-box{border:1px solid #e5e7eb;border-radius:12px;padding:10px}
  .cond-box-titulo{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;color:#374151;margin-bottom:8px}
  .cond-item{margin-bottom:8px}
  .cond-item-label{font-size:11.5px;font-weight:600;color:#4b5563}
  .cond-item-val{font-size:12.5px;font-weight:800;color:#1f2937;margin-top:1px}
  .cond-obs-texto{font-size:11px;color:#6b7280;line-height:1.6;text-align:justify;white-space:pre-wrap}
  .obs{font-size:11px;color:#6b7280;line-height:1.6;background:#f9fafb;border:1px solid #e5e7eb;border-radius:10px;padding:12px 14px;margin-bottom:16px;white-space:pre-wrap}
  .servicos-divisor{display:flex;align-items:center;gap:8px;margin:18px 0 10px}
  .servicos-divisor .linha{flex:1;height:1px;background:#e5e7eb}
  .servicos-divisor span{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:#374151}
  .servicos-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;text-align:center;margin-bottom:16px}
  .servico-item{padding:6px 3px;border:1px solid #f3f4f6;border-radius:9px;background:#fafafa}
  .servico-icone{width:18px;height:18px;border-radius:50%;background:#F0FDF4;display:flex;align-items:center;justify-content:center;margin:0 auto 4px}
  .servico-nome{font-size:7px;font-weight:700;color:#374151;text-transform:uppercase;letter-spacing:.2px}
  label{display:block;font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;margin-top:16px}
  input[type=text]{width:100%;height:44px;border:1px solid #d1d5db;border-radius:8px;padding:0 14px;font-size:14px;font-family:'Montserrat',sans-serif;color:#1f2937}
  input[type=text]:focus{outline:none;border-color:#79B913}
  .check-wrap{display:flex;align-items:flex-start;gap:9px;margin-top:18px;font-size:12.5px;color:#4b5563;line-height:1.5}
  .check-wrap input{width:18px;height:18px;flex-shrink:0;margin-top:2px;accent-color:#79B913}
  button{width:100%;height:50px;background:#79B913;color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:800;font-family:'Montserrat',sans-serif;margin-top:20px;cursor:pointer;transition:opacity .2s}
  button:hover{opacity:.9}
  button:disabled{background:#d1d5db;cursor:not-allowed}
  .erro{color:#dc2626;font-size:12px;margin-top:8px;font-weight:600}
  .sucesso{text-align:center;padding:20px 0}
  .sucesso .icone{font-size:52px;margin-bottom:14px}
  .rodape-legal{font-size:10px;color:#9ca3af;text-align:center;margin-top:20px;line-height:1.5}
  .gp-footer-bar{border-top:1px solid #e5e7eb;padding-top:12px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;font-size:9px;color:#4B5563;font-weight:600;margin-top:16px}
  .gp-footer-item{display:flex;align-items:center;gap:4px}
  h1{font-size:18px;color:#dc2626;font-weight:800}
  @media (max-width:480px){ .cond-grid{grid-template-columns:1fr} .servicos-grid{grid-template-columns:repeat(3,1fr)} .gp-content{padding:20px 16px} }
</style>
</head>
<body>
<div class="wrap">
  <img class="capa-img" src="imagens/capa.png" alt="SafeZone Smart" onerror="this.style.display='none'">
  <div class="gp-page">
    <img class="gp-watermark" src="imagens/marca-agua.png" alt="" onerror="this.style.display='none'">
    <img class="gp-header-right" src="imagens/topo-direito.png" alt="" onerror="this.style.display='none'">
    <div class="gp-content">
      <div class="gp-header">
        <img class="gp-logo" src="imagens/logo.png" alt="SafeZone Smart" onerror="this.style.display='none'">
        <span class="selo">🔒 Aceite eletrônico</span>
      </div>
      <div id="conteudo"><div style="text-align:center;color:#9ca3af;font-size:13px;padding:40px 0">Carregando proposta...</div></div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyCmc3t-fyBaBACjf2wVR3LdPlypfMk1eBU",
  authDomain: "safezone-os.firebaseapp.com",
  projectId: "safezone-os",
  storageBucket: "safezone-os.firebasestorage.app",
  messagingSenderId: "890631820717",
  appId: "1:890631820717:web:e7a3b5d5af8513f1de7d24"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function getToken(){ var p = new URLSearchParams(window.location.search); return p.get('id') || ''; }
function fmtValor(v){ return Number(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function escHtml(s){ var d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }
function mascaraCPF(el){
  var v = el.value.replace(/\D/g,'');
  if(v.length > 11) v = v.slice(0,11);
  v = v.replace(/^(\d{3})(\d)/, '$1.$2');
  v = v.replace(/^(\d{3})\.(\d{3})(\d)/, '$1.$2.$3');
  v = v.replace(/\.(\d{3})(\d{1,2})$/, '.$1-$2');
  el.value = v;
}

var SERVICOS_FIXOS = [
  {nome:'Segurança', icone:'<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12l2 2 4-4"/>'},
  {nome:'Conectividade', icone:'<path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/>'},
  {nome:'Infraestrutura', icone:'<circle cx="6" cy="6" r="2"/><circle cx="18" cy="6" r="2"/><circle cx="12" cy="18" r="2"/><path d="M6 8v2a4 4 0 0 0 4 4"/><path d="M18 8v2a4 4 0 0 1-4 4"/>'},
  {nome:'Automação', icone:'<path d="M3 9l9-7 9 7"/><path d="M9 22V12h6v10"/>'},
  {nome:'Suporte', icone:'<path d="M3 18v-6a9 9 0 0 1 18 0v6"/><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/>'}
];
function servicosGridHtml(){
  return '<div class="servicos-divisor"><div class="linha"></div><span>Nossos Serviços</span><div class="linha"></div></div>'+
    '<div class="servicos-grid">'+SERVICOS_FIXOS.map(function(s){
      return '<div class="servico-item"><div class="servico-icone"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#79B913" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+s.icone+'</svg></div><div class="servico-nome">'+s.nome+'</div></div>';
    }).join('')+'</div>';
}
function footerHtml(){
  var icPhone='<path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>';
  var icInsta='<rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>';
  var icMail='<path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline>';
  var icPin='<path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle>';
  function item(ic,txt){ return '<div class="gp-footer-item"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#79B913" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">'+ic+'</svg><span>'+txt+'</span></div>'; }
  return '<div class="gp-footer-bar">'+item(icPhone,'(19) 99686-9707')+item(icInsta,'@safezone.equipamentos')+item(icMail,'safezone.equipamentos@gmail.com')+item(icPin,'Leme/SP')+'</div>';
}

var _dadosProposta = null;
var _token = getToken();

function init(){
  var el = document.getElementById('conteudo');
  if(!_token){ el.innerHTML = '<h1>Link inválido</h1><div class="sub">Peça pra SafeZone reenviar o link da proposta.</div>'; return; }
  db.collection('propostas_publicas').doc(_token).get().then(function(snap){
    if(!snap.exists){ el.innerHTML = '<h1>Proposta não encontrada</h1><div class="sub">O link pode ter expirado. Fale com a SafeZone.</div>'; return; }
    _dadosProposta = snap.data();
    if(_dadosProposta.aceitoEm){ renderJaAceito(); return; }
    renderProposta();
  }).catch(function(e){ el.innerHTML = '<h1>Erro ao carregar</h1><div class="sub">'+escHtml(e.message)+'</div>'; });
}

function renderProposta(){
  var d = _dadosProposta;
  var el = document.getElementById('conteudo');
  var itens = d.itens||[];
  var linhasItens = itens.map(function(it){
    return '<tr><td>'+escHtml(it.nome||'')+'</td><td class="num">'+(it.qtd||1)+'</td><td class="num">R$ '+fmtValor(it.unit)+'</td><td class="num">R$ '+fmtValor((it.qtd||1)*(it.unit||0))+'</td></tr>';
  }).join('');
  var linhaServico = d.valorServicos ? '<tr class="servico-row"><td colspan="3">Serviços Técnicos</td><td class="num">R$ '+fmtValor(d.valorServicos)+'</td></tr>' : '';
  var tabela = (itens.length||d.valorServicos) ? (
    '<table><thead><tr><th>Descrição</th><th class="num">Qtd</th><th class="num">Valor</th><th class="num">Total</th></tr></thead><tbody>'+linhasItens+linhaServico+'</tbody></table>'
  ) : '';

  var capaTopo = d.aberturaTitulo ? (
    '<span class="eyebrow">Proposta comercial</span>'+
    '<div class="capa-titulo">'+escHtml(d.aberturaTitulo)+'</div>'+
    (d.aberturaTexto ? '<div class="capa-texto">'+escHtml(d.aberturaTexto).replace(/\n/g,'<br>')+'</div>' : '')
  ) : '';

  var condBoxes = '';
  if(d.vista || d.cartao || d.outro){
    var pagItens = '';
    if(d.vista) pagItens += '<div class="cond-item"><div class="cond-item-label">💵 À vista'+(d.vista.desconto?' (com desconto)':'')+'</div><div class="cond-item-val">R$ '+fmtValor(d.totalGeral*(1-(d.vista.desconto||0)/100))+'</div></div>';
    if(d.cartao) pagItens += '<div class="cond-item"><div class="cond-item-label">💳 Cartão de Crédito (Visa e Master)</div><div class="cond-item-val">'+d.cartao.parcelas+'x de R$ '+fmtValor(d.totalGeral/d.cartao.parcelas)+'</div></div>';
    if(d.outro && d.outro.label) pagItens += '<div class="cond-item"><div class="cond-item-label">'+escHtml(d.outro.label)+'</div>'+(d.outro.descricao?'<div class="cond-obs-texto">'+escHtml(d.outro.descricao)+'</div>':'')+'</div>';
    condBoxes = '<div class="cond-grid">'+
      '<div class="cond-box"><div class="cond-box-titulo">Formas de pagamento</div>'+pagItens+'</div>'+
      '<div class="cond-box"><div class="cond-box-titulo">📄 Observações</div><div class="cond-obs-texto">'+(d.observacoes?escHtml(d.observacoes).replace(/\n/g,'<br>'):'—')+'</div></div>'+
    '</div>';
  }

  el.innerHTML =
    capaTopo +
    '<div class="servico-titulo">'+escHtml((d.servico||'PROPOSTA').toUpperCase())+'</div>'+
    '<div class="sub">Preparada para '+escHtml(d.cliente||'')+'</div>'+
    tabela +
    (d.marcaLogo ? '<img class="fabricante-logo" src="'+escHtml(d.marcaLogo)+'" alt="'+escHtml(d.marca||'')+'">' : '') +
    '<div class="total-bar"><span class="total-label">Valor total do investimento</span><span class="total-val">R$ '+fmtValor(d.totalGeral)+'</span></div>'+
    condBoxes +
    (d.obs ? '<div class="obs">'+escHtml(d.obs)+'</div>' : '') +
    servicosGridHtml() +
    '<label>Nome completo</label>'+
    '<input type="text" id="ac-nome" placeholder="Seu nome completo">'+
    '<label>CPF</label>'+
    '<input type="text" id="ac-cpf" placeholder="000.000.000-00" oninput="mascaraCPF(this)">'+
    '<div class="check-wrap"><input type="checkbox" id="ac-check"><span>Li e concordo com os termos, valores e condições desta proposta comercial da SafeZone Smart.</span></div>'+
    '<div id="ac-erro" class="erro" style="display:none"></div>'+
    '<button id="ac-btn" onclick="confirmarAceite()">✅ Confirmar aceite</button>'+
    '<div class="rodape-legal">Ao confirmar, seu nome, CPF, data e hora ficam registrados como aceite eletrônico desta proposta, nos termos da legislação brasileira sobre assinatura eletrônica (MP 2.200-2/2001).</div>'+
    footerHtml();
}

function confirmarAceite(){
  var nome = document.getElementById('ac-nome').value.trim();
  var cpf = document.getElementById('ac-cpf').value.trim();
  var check = document.getElementById('ac-check').checked;
  var erroEl = document.getElementById('ac-erro');
  var cpfDigits = cpf.replace(/\D/g,'');
  if(!nome || nome.split(' ').length < 2){ erroEl.textContent = 'Informe seu nome completo.'; erroEl.style.display='block'; return; }
  if(cpfDigits.length !== 11){ erroEl.textContent = 'CPF inválido.'; erroEl.style.display='block'; return; }
  if(!check){ erroEl.textContent = 'Marque que você leu e concorda com os termos.'; erroEl.style.display='block'; return; }
  erroEl.style.display='none';

  var btn = document.getElementById('ac-btn');
  btn.disabled = true; btn.textContent = 'Enviando...';

  var registro = {
    token: _token,
    propostaId: _dadosProposta.propostaId||'',
    orcamentoId: _dadosProposta.orcamentoId||'',
    nomeDigitado: nome,
    cpf: cpfDigits,
    aceito: true,
    processadoHub: false,
    userAgent: navigator.userAgent,
    criadoEm: firebase.firestore.FieldValue.serverTimestamp()
  };

  db.collection('aceites_propostas').add(registro).then(function(){
    return db.collection('propostas_publicas').doc(_token).update({
      aceitoEm: firebase.firestore.FieldValue.serverTimestamp(),
      aceitoNome: nome, aceitoCpf: cpfDigits
    });
  }).then(function(){
    renderJaAceito();
  }).catch(function(e){
    erroEl.textContent = 'Erro ao registrar: '+e.message+'. Tente novamente.';
    erroEl.style.display = 'block';
    btn.disabled = false; btn.textContent = '✅ Confirmar aceite';
  });
}

function renderJaAceito(){
  var el = document.getElementById('conteudo');
  el.innerHTML = '<div class="sucesso"><div class="icone">✅</div>'+
    '<h1 style="text-transform:none;font-size:22px;color:#2D3748">Proposta aceita!</h1>'+
    '<div class="sub" style="margin-top:8px">Obrigado! A equipe da SafeZone Smart já foi avisada e vai entrar em contato pra dar sequência.</div></div>';
}

init();
</script>
</body>
</html>
