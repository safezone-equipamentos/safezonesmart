<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aceite de Proposta — SafeZone Smart</title>
<meta property="og:title" content="Confirmar aceite da proposta — SafeZone Smart">
<meta property="og:description" content="Toque para revisar e confirmar sua proposta.">
<meta property="og:image" content="https://safezonesmart.com.br/imagens/logo.png">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  /* ===== BASE = MOBILE (padrão, sem media query) ===== */
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Montserrat',sans-serif;background:#f3f4f6;color:#374151;min-height:100vh;padding:16px 10px;display:flex;justify-content:center}
  .wrap{max-width:480px;width:100%}
  #paginas{display:flex;flex-direction:column;gap:14px}
  .capa-img{width:100%;border-radius:10px;margin-bottom:14px;display:block}
  .gp-page{background:#fff;border-radius:12px;box-shadow:0 4px 16px rgba(0,0,0,.08);position:relative;overflow:hidden}
  .gp-watermark{position:absolute;top:15%;right:-10px;width:150px;opacity:.35;pointer-events:none;z-index:0}
  .gp-header-right{position:absolute;top:0;right:0;width:30%;height:auto;pointer-events:none;z-index:1}
  .gp-content{padding:20px 16px;position:relative;z-index:2}
  .gp-header{display:flex;align-items:center;margin-bottom:18px;padding-bottom:12px}
  .gp-logo{height:32px;width:auto;object-fit:contain}
  .eyebrow{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:#9ca3af;display:block;margin-bottom:8px}
  .capa-titulo{font-size:20px;font-weight:900;color:#2D3748;letter-spacing:-.3px;text-transform:uppercase;margin-bottom:12px;line-height:1.25}
  .capa-texto{font-size:14px;color:#374151;line-height:1.7;text-align:justify;font-weight:400}
  .abertura-imgs{margin-top:14px;display:grid;gap:8px;grid-template-columns:1fr}
  .abertura-imgs img{width:100%;max-height:160px;object-fit:cover;border-radius:12px;box-shadow:0 6px 16px rgba(0,0,0,.15);display:block}
  .servico-titulo{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:#6b7280;margin-bottom:3px}
  .sub{font-size:13px;color:#9ca3af;margin-bottom:16px}
  table{width:100%;border-collapse:collapse;margin-bottom:16px;font-size:11.5px}
  thead th{background:#79B913;color:#fff;font-weight:700;text-align:left;padding:7px 6px;font-size:9.5px}
  thead th:first-child{border-radius:6px 0 0 6px}
  thead th:last-child{border-radius:0 6px 6px 0}
  th.num,td.num{text-align:right;white-space:nowrap}
  td{color:#1f2937;padding:9px 6px;border-bottom:1px solid #f3f4f6;word-break:break-word}
  tr.servico-row td{font-weight:700;padding-top:11px}
  .total-bar{background:#F0FDF4;border-radius:10px;padding:14px;display:flex;flex-direction:column;gap:4px;margin-bottom:16px}
  .total-label{font-size:12.5px;font-weight:700;color:#1f2937}
  .total-val{font-size:22px;font-weight:800;color:#79B913}
  .fabricante-logo{display:block;height:32px;object-fit:contain;margin:0 auto 16px}
  .cond-grid{display:grid;grid-template-columns:1fr;gap:10px;margin-bottom:16px}
  .cond-box{border:1px solid #e5e7eb;border-radius:12px;padding:12px}
  .cond-box-titulo{font-size:11.5px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;color:#374151;margin-bottom:9px}
  .cond-item{margin-bottom:10px}
  .cond-item:last-child{margin-bottom:0}
  .cond-item-label{font-size:13px;font-weight:600;color:#4b5563}
  .cond-item-val{font-size:15px;font-weight:800;color:#1f2937;margin-top:2px}
  .cond-obs-texto{font-size:12.5px;color:#6b7280;line-height:1.65;text-align:justify;white-space:pre-wrap}
  .obs{font-size:12.5px;color:#6b7280;line-height:1.65;background:#f9fafb;border:1px solid #e5e7eb;border-radius:10px;padding:13px 14px;margin-bottom:16px;white-space:pre-wrap;text-align:justify}
  .pag-opcao{display:flex;align-items:center;justify-content:space-between;gap:10px;border:1.5px solid #e5e7eb;border-radius:12px;padding:13px 14px;margin-bottom:10px;cursor:pointer;transition:border-color .15s,background .15s}
  .pag-opcao.selecionada{border-color:#79B913;background:#F0FDF4}
  .pag-opcao input[type=radio]{width:19px;height:19px;flex-shrink:0;accent-color:#79B913;margin-right:10px}
  .pag-opcao-texto{flex:1}
  .pag-opcao-label{font-size:13px;font-weight:700;color:#1f2937}
  .pag-opcao-desc{font-size:11.5px;color:#6b7280;margin-top:3px;line-height:1.5}
  .pag-opcao-val{font-size:14px;font-weight:800;color:#79B913;white-space:nowrap}
  .pag-parcelas-select{margin-top:8px;width:100%;height:36px;border:1px solid #d1d5db;border-radius:7px;padding:0 10px;font-size:12.5px;font-family:'Montserrat',sans-serif;color:#1f2937;background:#fff}
  @keyframes gpPulso{0%,100%{box-shadow:0 0 0 3px rgba(220,38,38,.6)}50%{box-shadow:0 0 0 3px rgba(220,38,38,0)}}
  .campo-alerta{animation:gpPulso .6s ease-in-out 3;border-radius:8px}
  .servicos-divisor{display:flex;align-items:center;gap:8px;margin:18px 0 12px}
  .servicos-divisor .linha{flex:1;height:1px;background:#e5e7eb}
  .servicos-divisor span{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:#374151}
  .servicos-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;text-align:center;margin-bottom:16px}
  .servico-item{padding:10px 6px;border:1px solid #f3f4f6;border-radius:10px;background:#fafafa;display:flex;align-items:center;gap:8px;text-align:left}
  .servico-icone{width:26px;height:26px;flex-shrink:0;border-radius:50%;background:#F0FDF4;display:flex;align-items:center;justify-content:center}
  .servico-nome{font-size:10.5px;font-weight:700;color:#374151;text-transform:uppercase;letter-spacing:.2px}
  .servicos-grid .servico-item:last-child{grid-column:1/-1}
  .nome-extra{display:inline}
  label{display:block;font-size:11.5px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px;margin-top:18px}
  input[type=text]{width:100%;height:48px;border:1px solid #d1d5db;border-radius:8px;padding:0 14px;font-size:16px;font-family:'Montserrat',sans-serif;color:#1f2937}
  input[type=text]:focus{outline:none;border-color:#79B913}
  .check-wrap{display:flex;align-items:flex-start;gap:9px;margin-top:18px;font-size:13px;color:#4b5563;line-height:1.5}
  .check-wrap input{width:20px;height:20px;flex-shrink:0;margin-top:2px;accent-color:#79B913}
  button{width:100%;height:52px;background:#79B913;color:#fff;border:none;border-radius:9px;font-size:15px;font-weight:800;font-family:'Montserrat',sans-serif;margin-top:20px;cursor:pointer;transition:opacity .2s}
  button:hover{opacity:.9}
  button:disabled{background:#d1d5db;cursor:not-allowed}
  .erro{color:#dc2626;font-size:12.5px;margin-top:8px;font-weight:600}
  .sucesso{text-align:center;padding:20px 0}
  .sucesso .icone{font-size:52px;margin-bottom:14px}
  .rodape-legal{font-size:10.5px;color:#9ca3af;text-align:center;margin-top:20px;line-height:1.6}
  .gp-footer-bar{border-top:1px solid #e5e7eb;padding-top:12px;display:flex;flex-direction:column;gap:8px;font-size:11px;color:#4B5563;font-weight:600;margin-top:16px}
  .gp-footer-item{display:flex;align-items:center;gap:6px}
  h1{font-size:19px;color:#dc2626;font-weight:800}

  /* ===== DESKTOP (telas ≥ 720px): layout mais denso, fiel ao PDF impresso ===== */
  @media (min-width:720px){
    body{padding:32px 16px}
    .wrap{max-width:600px}
    #paginas{gap:16px}
    .capa-img{margin-bottom:16px}
    .gp-content{padding:28px 26px}
    .gp-header{margin-bottom:20px;padding-bottom:14px}
    .gp-logo{height:38px}
    .eyebrow{font-size:10px;letter-spacing:2px;margin-bottom:6px}
    .capa-titulo{font-size:24px;letter-spacing:-.5px;margin-bottom:14px;line-height:1.2}
    .capa-texto{font-size:12px;line-height:1.65;text-align:justify;font-weight:300}
    .abertura-imgs{margin-top:16px;gap:8px}
    .abertura-imgs.g2{grid-template-columns:1fr 1fr}
    .abertura-imgs img{max-height:180px;border-radius:12px}
    .servico-titulo{font-size:11px}
    .sub{font-size:12px;margin-bottom:16px}
    table{font-size:11px;margin-bottom:14px}
    thead th{padding:6px 8px;font-size:11px}
    td{padding:6px 8px}
    tr.servico-row td{padding-top:9px}
    .total-bar{flex-direction:row;justify-content:space-between;align-items:center;padding:10px 14px}
    .total-val{font-size:17px}
    .fabricante-logo{height:34px}
    .cond-grid{grid-template-columns:1fr 1fr;gap:10px}
    .cond-box{padding:10px}
    .cond-item-label{font-size:11.5px}
    .cond-item-val{font-size:12.5px}
    .cond-obs-texto,.obs{font-size:11px;text-align:justify}
    .pag-opcao{padding:11px 13px}
    .pag-opcao-label{font-size:12px}
    .pag-opcao-desc{font-size:11px}
    .pag-opcao-val{font-size:13px}
    .servicos-grid{grid-template-columns:repeat(5,1fr);gap:5px}
    .servico-item{flex-direction:column;text-align:center;padding:6px 3px}
    .servicos-grid .servico-item:last-child{grid-column:auto}
    .nome-extra{display:none}
    .servico-icone{width:18px;height:18px;margin:0 auto 4px}
    .servico-nome{font-size:7px}
    label{font-size:11px;margin-bottom:6px;margin-top:16px}
    input[type=text]{height:44px;font-size:14px}
    .check-wrap{font-size:12.5px}
    .check-wrap input{width:18px;height:18px}
    button{height:50px;font-size:14px}
    .erro{font-size:12px}
    .rodape-legal{font-size:10px}
    .gp-footer-bar{flex-direction:row;justify-content:space-between;flex-wrap:wrap;font-size:9px}
    h1{font-size:18px}
  }
</style>
</head>
<body>
<div class="wrap">
  <img class="capa-img" src="/imagens/capa.png" alt="SafeZone Smart" onerror="this.style.display='none'">
  <div id="paginas"><div class="gp-page"><div class="gp-content"><div style="text-align:center;color:#9ca3af;font-size:13px;padding:40px 0">Carregando proposta...</div></div></div></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyCmc3t-fyBaBACjf2wVR3LdPlypfMk1eBU",
  authDomain: "safezone-os.firebaseapp.com",
  projectId: "safezone-os",
  storageBucket: "safezone-os.firebasestorage.app",
  messagingSenderId: "890631820717",
  appId: "1:890631820717:web:e7a3b5d5af8513f1de7d24"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function getToken(){ var p = new URLSearchParams(window.location.search); return p.get('id') || ''; }
function fmtValor(v){ return Number(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function escHtml(s){ var d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }
function mascaraCPF(el){
  var v = el.value.replace(/\D/g,'');
  if(v.length > 11) v = v.slice(0,11);
  v = v.replace(/^(\d{3})(\d)/, '$1.$2');
  v = v.replace(/^(\d{3})\.(\d{3})(\d)/, '$1.$2.$3');
  v = v.replace(/\.(\d{3})(\d{1,2})$/, '.$1-$2');
  el.value = v;
}

var SERVICOS_FIXOS = [
  {nome:'Segurança', icone:'<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12l2 2 4-4"/>'},
  {nome:'Conectividade', icone:'<path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/>'},
  {nome:'Infraestrutura', icone:'<circle cx="6" cy="6" r="2"/><circle cx="18" cy="6" r="2"/><circle cx="12" cy="18" r="2"/><path d="M6 8v2a4 4 0 0 0 4 4"/><path d="M18 8v2a4 4 0 0 1-4 4"/>'},
  {nome:'Automação', icone:'<path d="M3 9l9-7 9 7"/><path d="M9 22V12h6v10"/>'},
  {nome:'Suporte<span class="nome-extra"> Especializado</span>', icone:'<path d="M3 18v-6a9 9 0 0 1 18 0v6"/><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/>'}
];
function servicosGridHtml(){
  return '<div class="servicos-divisor"><div class="linha"></div><span>Nossos Serviços</span><div class="linha"></div></div>'+
    '<div class="servicos-grid">'+SERVICOS_FIXOS.map(function(s){
      return '<div class="servico-item"><div class="servico-icone"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#79B913" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+s.icone+'</svg></div><div class="servico-nome">'+s.nome+'</div></div>';
    }).join('')+'</div>';
}
function footerHtml(){
  var icPhone='<path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>';
  var icInsta='<rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>';
  var icMail='<path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline>';
  var icPin='<path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle>';
  function item(ic,txt){ return '<div class="gp-footer-item"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#79B913" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">'+ic+'</svg><span>'+txt+'</span></div>'; }
  return '<div class="gp-footer-bar">'+item(icPhone,'(19) 99686-9707')+item(icInsta,'@safezone.equipamentos')+item(icMail,'safezone.equipamentos@gmail.com')+item(icPin,'Leme/SP')+'</div>';
}

// Monta a "casca" de uma página física (marca d'água + gráfico diagonal + logo).
function montarPaginaHtml(conteudoInterno){
  return '<div class="gp-page">'+
    '<img class="gp-watermark" src="/imagens/marca-agua.png" alt="" onerror="this.style.display=\'none\'">'+
    '<img class="gp-header-right" src="/imagens/topo-direito.png" alt="" onerror="this.style.display=\'none\'">'+
    '<div class="gp-content">'+
      '<div class="gp-header"><img class="gp-logo" src="/imagens/logo.png" alt="SafeZone Smart" onerror="this.style.display=\'none\'"></div>'+
      conteudoInterno+
    '</div>'+
  '</div>';
}

var _dadosProposta = null;
var _token = getToken();

function init(){
  var el = document.getElementById('paginas');
  if(!_token){ el.innerHTML = montarPaginaHtml('<h1>Link inválido</h1><div class="sub">Peça pra SafeZone reenviar o link da proposta.</div>'); return; }
  db.collection('propostas_publicas').doc(_token).get().then(function(snap){
    if(!snap.exists){ el.innerHTML = montarPaginaHtml('<h1>Proposta não encontrada</h1><div class="sub">O link pode ter expirado. Fale com a SafeZone.</div>'); return; }
    _dadosProposta = snap.data();
    if(_dadosProposta.aceitoEm){ renderJaAceito(); return; }
    renderProposta();
  }).catch(function(e){ el.innerHTML = montarPaginaHtml('<h1>Erro ao carregar</h1><div class="sub">'+escHtml(e.message)+'</div>'); });
}

// Página 1 — Abertura: eyebrow + título com nome do cliente + texto descritivo + grade de
// serviços + rodapé. Fica SEPARADA da página de serviço/formulário, igual no documento real.
function imagensAberturaHtml(slugs){
  if(!slugs || !slugs.length) return '';
  var classe = slugs.length===1 ? 'g1' : 'g2';
  return '<div class="abertura-imgs '+classe+'">'+slugs.map(function(slug){
    return '<img src="/imagens/servicos/'+slug+'.png" alt="" onerror="this.parentElement.removeChild(this)">';
  }).join('')+'</div>';
}

function conteudoAberturaHtml(d){
  if(!d.aberturaTitulo) return '';
  return '<span class="eyebrow">Proposta comercial</span>'+
    '<div class="capa-titulo">'+escHtml(d.aberturaTitulo)+'</div>'+
    (d.aberturaTexto ? '<div class="capa-texto">'+escHtml(d.aberturaTexto).replace(/\n/g,'<br>')+'</div>' : '')+
    imagensAberturaHtml(d.aberturaImagens)+
    servicosGridHtml()+
    footerHtml();
}

// Página 2 — Serviço + formulário de aceite.
function conteudoServicoHtml(d){
  var itens = d.itens||[];
  var linhasItens = itens.map(function(it){
    return '<tr><td>'+escHtml(it.nome||'')+'</td><td class="num">'+(it.qtd||1)+'</td><td class="num">R$ '+fmtValor(it.unit)+'</td><td class="num">R$ '+fmtValor((it.qtd||1)*(it.unit||0))+'</td></tr>';
  }).join('');
  var linhaServico = d.valorServicos ? '<tr class="servico-row"><td colspan="3">Serviços Técnicos</td><td class="num">R$ '+fmtValor(d.valorServicos)+'</td></tr>' : '';
  var tabela = (itens.length||d.valorServicos) ? (
    '<table><thead><tr><th>Descrição</th><th class="num">Qtd</th><th class="num">Valor</th><th class="num">Total</th></tr></thead><tbody>'+linhasItens+linhaServico+'</tbody></table>'
  ) : '';

  var condBoxes = '';
  if(d.vista || d.cartao || d.outro){
    var pagItens = '';
    if(d.vista) pagItens += '<div class="cond-item"><div class="cond-item-label">💵 À vista'+(d.vista.desconto?' (com desconto)':'')+'</div><div class="cond-item-val">R$ '+fmtValor(d.totalGeral*(1-(d.vista.desconto||0)/100))+'</div></div>';
    if(d.cartao) pagItens += '<div class="cond-item"><div class="cond-item-label">💳 Cartão de Crédito (Visa e Master)</div><div class="cond-item-val">'+d.cartao.parcelas+'x de R$ '+fmtValor(d.totalGeral/d.cartao.parcelas)+'</div></div>';
    if(d.outro && d.outro.label) pagItens += '<div class="cond-item"><div class="cond-item-label">'+escHtml(d.outro.label)+'</div>'+(d.outro.descricao?'<div class="cond-obs-texto">'+escHtml(d.outro.descricao)+'</div>':'')+'</div>';
    condBoxes = '<div class="cond-grid">'+
      '<div class="cond-box"><div class="cond-box-titulo">Formas de pagamento</div>'+pagItens+'</div>'+
      '<div class="cond-box"><div class="cond-box-titulo">📄 Observações</div><div class="cond-obs-texto">'+(d.observacoes?escHtml(d.observacoes).replace(/\n/g,'<br>'):'—')+'</div></div>'+
    '</div>';
  }

  return '<div class="servico-titulo">'+escHtml((d.servico||'PROPOSTA').toUpperCase())+'</div>'+
    (d.descricao ? '<div class="capa-texto" style="margin:6px 0 16px">'+escHtml(d.descricao).replace(/\n/g,'<br>')+'</div>' : '') +
    tabela +
    (d.marcaLogo ? '<img class="fabricante-logo" src="'+escHtml(d.marcaLogo)+'" alt="'+escHtml(d.marca||'')+'">' : '') +
    '<div class="total-bar"><span class="total-label">Valor total do investimento</span><span class="total-val">R$ '+fmtValor(d.totalGeral)+'</span></div>'+
    condBoxes +
    (d.obs ? '<div class="obs">'+escHtml(d.obs)+'</div>' : '') +
    footerHtml();
}

// Página 3 — Aceite: o cliente ESCOLHE a forma de pagamento (obrigatório quando há mais de uma
// opção — se só existir uma, ela já vem pré-selecionada) + nome completo + CPF + termo.
function opcoesPagamentoHtml(d){
  var opcoes = [];
  if(d.vista) opcoes.push({
    valor: 'vista', label: '💵 À vista'+(d.vista.desconto?' (com desconto)':''),
    desc: d.vista.desconto ? (d.vista.desconto+'% de desconto sobre o valor total') : '',
    total: d.totalGeral*(1-(d.vista.desconto||0)/100)
  });
  if(d.cartao) opcoes.push({
    valor: 'cartao', label: '💳 Cartão de Crédito (Visa e Master)',
    desc: 'Sem juros — escolha o número de parcelas:',
    total: d.totalGeral/d.cartao.parcelas, sufixoTotal: '/mês',
    parcelasMax: d.cartao.parcelas
  });
  if(d.outro && d.outro.label) opcoes.push({
    valor: 'outro', label: escHtml(d.outro.label), desc: d.outro.descricao?escHtml(d.outro.descricao):'',
    total: null
  });
  if(!opcoes.length) return '';
  var unica = opcoes.length === 1;
  return '<div id="ac-pagamento-wrap"><label>Forma de pagamento</label>'+
    opcoes.map(function(o, i){
      var checked = unica ? ' checked' : '';
      var seletorParcelas = '';
      if(o.parcelasMax){
        var optsParcelas = '';
        for(var n=1; n<=o.parcelasMax; n++){ optsParcelas += '<option value="'+n+'"'+(n===o.parcelasMax?' selected':'')+'>'+n+'x de R$ '+fmtValor(d.totalGeral/n)+'</option>'; }
        seletorParcelas = '<select id="ac-parcelas-select" class="pag-parcelas-select" onclick="event.stopPropagation()" onchange="atualizarParcelas(this)">'+optsParcelas+'</select>';
      }
      return '<label class="pag-opcao'+(unica?' selecionada':'')+'" onclick="marcarPagamentoSelecionado(this)">'+
        '<input type="radio" name="ac-pagamento" value="'+o.valor+'"'+checked+'>'+
        '<div class="pag-opcao-texto"><div class="pag-opcao-label">'+o.label+'</div>'+(o.desc?'<div class="pag-opcao-desc">'+o.desc+'</div>':'')+seletorParcelas+'</div>'+
        (o.total!=null ? '<div class="pag-opcao-val" id="'+(o.valor==='cartao'?'ac-parcelas-valor':'')+'">R$ '+fmtValor(o.total)+(o.sufixoTotal||'')+'</div>' : '')+
      '</label>';
    }).join('')+'</div>';
}

function atualizarParcelas(select){
  marcarPagamentoSelecionado(select.closest('.pag-opcao'));
  var d = _dadosProposta || {};
  var parcelas = parseInt(select.value,10) || 1;
  var valorEl = document.getElementById('ac-parcelas-valor');
  if(valorEl) valorEl.textContent = 'R$ '+fmtValor(d.totalGeral/parcelas)+'/mês';
}

function conteudoAceiteHtml(d){
  return '<span class="eyebrow">✍️ Confirme seu aceite</span>'+
    '<div class="capa-titulo" style="font-size:18px">Falta pouco, '+escHtml((d.cliente||'').split(' ')[0]||'')+'!</div>'+
    opcoesPagamentoHtml(d)+
    '<label>Nome completo</label>'+
    '<input type="text" id="ac-nome" placeholder="Seu nome completo">'+
    '<label>CPF</label>'+
    '<input type="text" id="ac-cpf" placeholder="000.000.000-00" oninput="mascaraCPF(this)">'+
    '<div class="check-wrap" id="ac-check-wrap"><input type="checkbox" id="ac-check"><span>Li e concordo com os termos, valores e condições desta proposta comercial da SafeZone Smart.</span></div>'+
    '<div id="ac-erro" class="erro" style="display:none"></div>'+
    '<button id="ac-btn" onclick="confirmarAceite()">✅ Aceitar proposta comercial</button>'+
    '<div class="rodape-legal">Ao confirmar, seu nome, CPF, forma de pagamento escolhida, data e hora ficam registrados como aceite eletrônico desta proposta, nos termos da legislação brasileira sobre assinatura eletrônica (MP 2.200-2/2001).</div>'+
    footerHtml();
}

function marcarPagamentoSelecionado(el){
  document.querySelectorAll('.pag-opcao').forEach(function(x){ x.classList.remove('selecionada'); });
  el.classList.add('selecionada');
}

// Mesmo pulso vermelho (.campo-alerta) usado no SafeZone HUB, replicado aqui — destaca
// visualmente qual campo precisa de atenção, além da mensagem de erro em texto.
function destacarCampoErro(elId){
  var el = document.getElementById(elId);
  if(!el) return;
  el.classList.add('campo-alerta');
  setTimeout(function(){ el.classList.remove('campo-alerta'); }, 1800);
}

function renderProposta(){
  var d = _dadosProposta;
  var el = document.getElementById('paginas');
  var html = '';
  var conteudoAbertura = conteudoAberturaHtml(d);
  if(conteudoAbertura) html += montarPaginaHtml(conteudoAbertura);
  html += montarPaginaHtml(conteudoServicoHtml(d));
  html += montarPaginaHtml(conteudoAceiteHtml(d));
  el.innerHTML = html;
}

function confirmarAceite(){
  var d = _dadosProposta || {};
  var nome = document.getElementById('ac-nome').value.trim();
  var cpf = document.getElementById('ac-cpf').value.trim();
  var check = document.getElementById('ac-check').checked;
  var erroEl = document.getElementById('ac-erro');
  var cpfDigits = cpf.replace(/\D/g,'');
  var temOpcoesPagamento = !!(d.vista || d.cartao || d.outro);
  var radioSelecionado = document.querySelector('input[name="ac-pagamento"]:checked');

  if(temOpcoesPagamento && !radioSelecionado){ erroEl.textContent = 'Selecione a forma de pagamento.'; erroEl.style.display='block'; destacarCampoErro('ac-pagamento-wrap'); return; }
  if(!nome || nome.split(' ').length < 2){ erroEl.textContent = 'Informe seu nome completo.'; erroEl.style.display='block'; destacarCampoErro('ac-nome'); return; }
  if(cpfDigits.length !== 11){ erroEl.textContent = 'CPF inválido.'; erroEl.style.display='block'; destacarCampoErro('ac-cpf'); return; }
  if(!check){ erroEl.textContent = 'Marque que você leu e concorda com os termos.'; erroEl.style.display='block'; destacarCampoErro('ac-check-wrap'); return; }
  erroEl.style.display='none';

  var btn = document.getElementById('ac-btn');
  btn.disabled = true; btn.textContent = 'Enviando...';

  var formaPagamento = radioSelecionado ? radioSelecionado.value : '';
  var formaPagamentoLabel = radioSelecionado ? (radioSelecionado.closest('.pag-opcao').querySelector('.pag-opcao-label').textContent||'') : '';
  var parcelasEscolhidas = null;
  if(formaPagamento === 'cartao'){
    var selParc = document.getElementById('ac-parcelas-select');
    parcelasEscolhidas = selParc ? parseInt(selParc.value,10) : null;
    if(parcelasEscolhidas) formaPagamentoLabel += ' — '+parcelasEscolhidas+'x';
  }

  var registro = {
    token: _token,
    propostaId: d.propostaId||'',
    orcamentoId: d.orcamentoId||'',
    nomeDigitado: nome,
    cpf: cpfDigits,
    formaPagamento: formaPagamento,
    formaPagamentoLabel: formaPagamentoLabel,
    parcelasEscolhidas: parcelasEscolhidas,
    aceito: true,
    processadoHub: false,
    userAgent: navigator.userAgent,
    criadoEm: firebase.firestore.FieldValue.serverTimestamp()
  };

  db.collection('aceites_propostas').add(registro).then(function(){
    return db.collection('propostas_publicas').doc(_token).update({
      aceitoEm: firebase.firestore.FieldValue.serverTimestamp(),
      aceitoNome: nome, aceitoCpf: cpfDigits, aceitoFormaPagamento: formaPagamentoLabel
    });
  }).then(function(){
    renderJaAceito();
  }).catch(function(e){
    erroEl.textContent = 'Erro ao registrar: '+e.message+'. Tente novamente.';
    erroEl.style.display = 'block';
    btn.disabled = false; btn.textContent = '✅ Aceitar proposta comercial';
  });
}

function renderJaAceito(){
  var el = document.getElementById('paginas');
  el.innerHTML = montarPaginaHtml('<div class="sucesso"><div class="icone">✅</div>'+
    '<h1 style="text-transform:none;font-size:22px;color:#2D3748">Proposta aceita!</h1>'+
    '<div class="sub" style="margin-top:8px">Muito obrigado por escolher os serviços da SafeZone Smart! Nossa equipe já foi avisada e vai retornar o contato pra dar sequência.</div></div>');
}

init();
</script>
</body>
</html>
